// ─── DATA PARSING ───────────────────────────────────────────────────────────
function parseSessions(raw) {
  return raw.split("|").map(s => {
    const [d, r, h] = s.split(",");
    return { d, r: parseFloat(r), h: parseFloat(h) };
  });
}
function parseMonthly(raw) {
  return raw.split("|").map(s => {
    const [d, r] = s.split(",");
    return { d, r: parseFloat(r) };
  });
}
function parseCashouts(raw) {
  return raw.split("|").map(s => {
    const [d, v] = s.split(",");
    return { d, v: parseFloat(v) };
  });
}
function parseBetting(raw) {
  if (!raw) return [];
  return raw.split("|").map(s => {
    const [d, v] = s.split(",");
    return { d, v: parseFloat(v) };
  });
}

const fmt = (n, dec = 0) => {
  if (n === undefined || n === null || isNaN(n)) return "$0";
  const sign = n < 0 ? "-" : n > 0 ? "+" : "";
  return `${sign}$${Math.abs(n).toLocaleString("en-US", { minimumFractionDigits: dec, maximumFractionDigits: dec })}`;
};
const fmtK = (n) => {
  if (Math.abs(n) >= 1000) return `$${(n/1000).toFixed(0)}K`;
  return `$${n.toFixed(0)}`;
};
const fmtPlain = (n) => `$${n.toLocaleString("en-US", { maximumFractionDigits: 0 })}`;

function PokerDashboard() {
  const [tab, setTab] = useState("dash");
  const [chartPeriod, setChartPeriod] = useState("all");
  const [statsPeriod, setStatsPeriod] = useState("all");
  const [customRange, setCustomRange] = useState({ from: "", to: TODAY });
  const [allEntries] = useState(() => parseSessions(SESSIONS_RAW));
  const [monthlyPre] = useState(() => parseMonthly(MONTHLY_PRE_RAW));
  const [cashouts] = useState(() => parseCashouts(CASHOUTS_RAW));
  const [betting] = useState(() => parseBetting(BETTING_RAW));
  const [bankroll, setBankroll] = useState(INIT_BANKROLL);
  const [bettingBR, setBettingBR] = useState(BETTING_BANKROLL);
  const [eurUsd, setEurUsd] = useState(DEFAULT_EUR_USD);
  const [newSessions, setNewSessions] = useState([]);
  const [newBettingEntries, setNewBettingEntries] = useState([]);
  const [newCashouts, setNewCashouts] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("ok"); // "ok" | "saving" | "error"

  // ─── FIRESTORE PERSISTENCE ────────────────────────────────────────────────
  const DOC_REF = db.collection("poker").doc("main");

  // Load from Firestore on mount
  useEffect(() => {
    DOC_REF.get().then(doc => {
      if (doc.exists) {
        const d = doc.data();
        if (d.bankroll) setBankroll(d.bankroll);
        if (d.eurUsd) setEurUsd(d.eurUsd);
        if (d.newSessions) setNewSessions(d.newSessions);
        if (d.newCashouts) setNewCashouts(d.newCashouts);
        // One-time migration: reset betting to EUR system
        if (!d.bettingV2) {
          setBettingBR(5656);
          setNewBettingEntries([]);
        } else {
          if (d.bettingBR !== undefined) setBettingBR(d.bettingBR);
          if (d.newBettingEntries) setNewBettingEntries(d.newBettingEntries);
        }
      }
      setLoaded(true);
    }).catch(e => {
      console.error("Firestore load error:", e);
      setLoaded(true);
    });
  }, []);

  // Auto-save to Firestore when data changes (debounced)
  const saveRef = useRef(null);
  useEffect(() => {
    if (!loaded) return;
    clearTimeout(saveRef.current);
    setSaveStatus("saving");
    saveRef.current = setTimeout(() => {
      DOC_REF.set({
        bankroll, bettingBR, eurUsd, newSessions, newBettingEntries, newCashouts,
        bettingV2: true, updatedAt: new Date().toISOString()
      }).then(() => {
        setSaveStatus("ok");
      }).catch(e => {
        console.error("Firestore save error:", e);
        setSaveStatus("error");
      });
    }, 1000);
  }, [loaded, bankroll, bettingBR, eurUsd, newSessions, newBettingEntries, newCashouts]);

  // Auto-fetch EUR/USD rate
  useEffect(() => {
    (async () => {
      try {
        const res = await fetch("https://open.er-api.com/v6/latest/EUR");
        const data = await res.json();
        if (data?.rates?.USD) {
          setEurUsd(Math.round(data.rates.USD * 1000) / 1000);
        }
      } catch(e) {}
    })();
  }, []);

  // JSON import/export as backup
  const exportJSON = useCallback(() => {
    const data = { bankroll, bettingBR, eurUsd, newSessions, newBettingEntries, newCashouts, bettingV2: true, exportDate: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `poker-save-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }, [bankroll, bettingBR, eurUsd, newSessions, newBettingEntries, newCashouts]);

  const importJSON = useCallback((e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.bankroll) setBankroll(data.bankroll);
        if (data.eurUsd) setEurUsd(data.eurUsd);
        if (data.newSessions) setNewSessions(data.newSessions);
        if (data.newCashouts) setNewCashouts(data.newCashouts);
        if (data.bettingV2) {
          if (data.bettingBR !== undefined) setBettingBR(data.bettingBR);
          if (data.newBettingEntries) setNewBettingEntries(data.newBettingEntries);
        } else {
          setBettingBR(5656);
          setNewBettingEntries([]);
        }
      } catch(err) {}
    };
    reader.readAsText(file);
  }, []);

  // Simple setters
  const saveBankroll = useCallback((br) => setBankroll(br), []);
  const saveBettingBR = useCallback((v) => setBettingBR(v), []);
  const saveEurUsd = useCallback((v) => setEurUsd(v), []);
  const saveNewSessions = useCallback((sess) => setNewSessions(sess), []);
  const saveNewBetting = useCallback((entries) => setNewBettingEntries(entries), []);
  const saveNewCashouts = useCallback((entries) => setNewCashouts(entries), []);
  // Merge historical + user-added sessions, sorted by date
  const dailySessions = useMemo(() => {
    const historical = allEntries.filter(s => s.d >= DAILY_START);
    return [...historical, ...newSessions].sort((a,b) => a.d.localeCompare(b.d));
  }, [allEntries, newSessions]);

  // Merge all betting entries
  const allBetting = useMemo(() => [...betting, ...newBettingEntries], [betting, newBettingEntries]);

  // Merge all cashouts
  const allCashouts = useMemo(() =>
    [...cashouts, ...newCashouts].sort((a,b) => a.d.localeCompare(b.d)),
    [cashouts, newCashouts]);

  // ─── COMPUTED DATA ──────────────────────────────────────────────────────
  const stats = useMemo(() => {
    // Monthly entries include pre-2020 + 2020 Q1 (all from MONTHLY_PRE_RAW)
    const allMonthly = monthlyPre;
    const totalMonthlyResult = allMonthly.reduce((s, x) => s + x.r, 0);

    // Daily stats (with hours) - from April 2020+
    const dailyResult = dailySessions.reduce((s, x) => s + x.r, 0);
    const totalHours = dailySessions.reduce((s, x) => s + x.h, 0);
    const totalPoker = totalMonthlyResult + dailyResult;
    const totalBettingEur = allBetting.reduce((s, x) => s + x.v, 0); // in EUR
    const totalCashouts = allCashouts.reduce((s, x) => s + x.v, 0);

    const now = new Date();
    const curMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    const curYear = String(now.getFullYear());

    // Current month/year — poker
    const monthSess = dailySessions.filter(s => getYM(s.d) === curMonth);
    const yearSess = dailySessions.filter(s => getY(s.d) === curYear);
    const monthPoker = monthSess.reduce((s, x) => s + x.r, 0);
    const monthHours = monthSess.reduce((s, x) => s + x.h, 0);
    const yearPoker = yearSess.reduce((s, x) => s + x.r, 0);
    const yearHours = yearSess.reduce((s, x) => s + x.h, 0);

    // Current month/year — betting (in EUR)
    const monthBettingEur = allBetting.filter(b => getYM(b.d) === curMonth).reduce((s,x) => s+x.v, 0);
    const yearBettingEur = allBetting.filter(b => getY(b.d) === curYear).reduce((s,x) => s+x.v, 0);

    // Win/loss stats — daily only (fair comparison)
    const winDays = dailySessions.filter(s => s.r > 0).length;
    const lossDays = dailySessions.filter(s => s.r < 0).length;
    const winPct = dailySessions.length > 0 ? (winDays / dailySessions.length * 100) : 0;

    // Best/worst DAY — daily data only!
    const bestDay = dailySessions.reduce((best, s) => s.r > best.r ? s : best, dailySessions[0]);
    const worstDay = dailySessions.reduce((worst, s) => s.r < worst.r ? s : worst, dailySessions[0]);

    // Monthly aggregation — POKER ONLY (betting separate)
    const byMonth = {};

    allMonthly.forEach(m => {
      const ym = getYM(m.d);
      byMonth[ym] = { result: m.r, hours: 0, sessions: 0, isMonthly: true };
    });

    dailySessions.forEach(s => {
      const ym = getYM(s.d);
      if (!byMonth[ym]) byMonth[ym] = { result: 0, hours: 0, sessions: 0, isMonthly: false };
      byMonth[ym].result += s.r;
      byMonth[ym].hours += s.h;
      byMonth[ym].sessions++;
      byMonth[ym].isMonthly = false;
    });

    const monthlyData = Object.entries(byMonth)
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([ym, data]) => ({
        month: ym,
        label: monthNames[parseInt(ym.slice(5,7))-1] + " " + ym.slice(2,4),
        ...data,
        dph: data.hours > 0 ? data.result / data.hours : null,
      }));

    // Best/worst MONTH — poker only
    const bestMonth = monthlyData.reduce((best, m) => m.result > best.result ? m : best, monthlyData[0]);
    const worstMonth = monthlyData.reduce((worst, m) => m.result < worst.result ? m : worst, monthlyData[0]);

    // POKER equity curve (no betting)
    const pokerEvents = [];
    allMonthly.forEach(m => pokerEvents.push({ d: m.d, v: m.r }));
    dailySessions.forEach(s => pokerEvents.push({ d: s.d, v: s.r }));
    pokerEvents.sort((a,b) => a.d.localeCompare(b.d));

    const equityCurveRaw = [];
    let cumul = 0;
    pokerEvents.forEach(e => {
      cumul += e.v;
      equityCurveRaw.push({ d: e.d, v: cumul });
    });

    // Monthly-aggregated equity curve (for all-time view)
    const equityCurveMonthly = [];
    const monthlyEndpoints = {};
    equityCurveRaw.forEach(p => {
      const ym = getYM(p.d);
      monthlyEndpoints[ym] = p.v;
    });
    Object.entries(monthlyEndpoints)
      .sort(([a],[b]) => a.localeCompare(b))
      .forEach(([ym, v]) => {
        equityCurveMonthly.push({ d: ym + "-28", v });
      });

    // BETTING equity curve (EUR)
    const bettingSorted = [...allBetting].sort((a,b) => a.d.localeCompare(b.d));
    const bettingEquity = [];
    let bCumul = 0;
    bettingSorted.forEach(b => {
      bCumul += b.v;
      bettingEquity.push({ d: b.d, v: bCumul });
    });

    // Year aggregation — poker and betting separate
    const byYear = {};
    allMonthly.forEach(m => {
      const y = getY(m.d);
      if (!byYear[y]) byYear[y] = { poker: 0, bettingEur: 0, hours: 0, sessions: 0, hasHours: false };
      byYear[y].poker += m.r;
    });
    dailySessions.forEach(s => {
      const y = getY(s.d);
      if (!byYear[y]) byYear[y] = { poker: 0, bettingEur: 0, hours: 0, sessions: 0, hasHours: true };
      byYear[y].poker += s.r;
      byYear[y].hours += s.h;
      byYear[y].sessions++;
      byYear[y].hasHours = true;
    });
    allBetting.forEach(b => {
      const y = getY(b.d);
      if (!byYear[y]) byYear[y] = { poker: 0, bettingEur: 0, hours: 0, sessions: 0, hasHours: false };
      byYear[y].bettingEur += b.v;
    });

    // Max drawdown — poker equity curve
    let maxEquity = 0;
    let maxDrawdown = 0;
    equityCurveRaw.forEach(p => {
      if (p.v > maxEquity) maxEquity = p.v;
      const dd = p.v - maxEquity;
      if (dd < maxDrawdown) maxDrawdown = dd;
    });

    // Best/worst year — poker only
    const yearEntries = Object.entries(byYear).map(([y, d]) => ({ year: y, result: d.poker }));
    const bestYear = yearEntries.reduce((best, y) => y.result > best.result ? y : best, yearEntries[0]);
    const worstYear = yearEntries.reduce((worst, y) => y.result < worst.result ? y : worst, yearEntries[0]);

    return {
      totalPoker, totalBettingEur, totalCashouts,
      totalHours, dailyResult,
      monthPoker, monthBettingEur, monthHours,
      yearPoker, yearBettingEur, yearHours,
      winDays, lossDays, winPct,
      bestDay, worstDay, bestMonth, worstMonth, bestYear, worstYear,
      monthlyData, equityCurveRaw, equityCurveMonthly, bettingEquity, byYear,
      dailySessions: dailySessions.length,
      dphAll: totalHours > 0 ? dailyResult / totalHours : 0,
      dphYear: yearHours > 0 ? yearPoker / yearHours : 0,
      dphMonth: monthHours > 0 ? monthPoker / monthHours : 0,
      maxDrawdown,
      bankrollPoker: Object.values(bankroll).reduce((s,v) => s+v, 0),
      bankrollBettingEur: bettingBR,
    };
  }, [dailySessions, monthlyPre, allCashouts, allBetting, bankroll, bettingBR, eurUsd]);

  // Filter equity curve by period
  // "all" uses monthly aggregation for time-proportional display
  // shorter periods use daily data for detail
  const filteredEquity = useMemo(() => {
    if (chartPeriod === "all") return stats.equityCurveMonthly;
    let fromStr, toStr;
    if (chartPeriod === "custom") {
      fromStr = customRange.from || "2000-01-01";
      toStr = customRange.to || TODAY;
    } else {
      const now = new Date();
      let cutoff;
      if (chartPeriod === "3y") cutoff = new Date(now.getFullYear()-3, now.getMonth(), now.getDate());
      else if (chartPeriod === "1y") cutoff = new Date(now.getFullYear()-1, now.getMonth(), now.getDate());
      else if (chartPeriod === "6m") cutoff = new Date(now.getFullYear(), now.getMonth()-6, now.getDate());
      else cutoff = new Date(now.getFullYear(), now.getMonth()-3, now.getDate());
      fromStr = cutoff.toISOString().slice(0,10);
      toStr = TODAY;
    }
    return stats.equityCurveRaw.filter(p => p.d >= fromStr && p.d <= toStr);
  }, [stats.equityCurveRaw, stats.equityCurveMonthly, chartPeriod, customRange]);

  const filteredMonthly = useMemo(() => {
    if (chartPeriod === "all") return stats.monthlyData;
    if (chartPeriod === "custom") {
      const fromYM = (customRange.from || "2000-01").slice(0,7);
      const toYM = (customRange.to || TODAY).slice(0,7);
      return stats.monthlyData.filter(m => m.month >= fromYM && m.month <= toYM);
    }
    let months;
    if (chartPeriod === "3y") months = 36;
    else if (chartPeriod === "1y") months = 12;
    else if (chartPeriod === "6m") months = 6;
    else months = 3;
    return stats.monthlyData.slice(-months);
  }, [stats.monthlyData, chartPeriod, customRange]);

  // Bankroll pie data (including betting)
  const bankrollPie = useMemo(() => {
    return Object.entries(bankroll)
      .filter(([,v]) => v > 0)
      .map(([name, value]) => ({ name, value }))
      .sort((a,b) => b.value - a.value);
  }, [bankroll]);

  const tabs = [
    { id: "dash", label: "\u0414\u0430\u0448\u0431\u043e\u0440\u0434", icon: "\u25a6" },
    { id: "input", label: "\u0412\u0432\u043e\u0434", icon: "+" },
    { id: "charts", label: "\u0413\u0440\u0430\u0444\u0438\u043a\u0438", icon: "\u25e2" },
    { id: "bankroll", label: "\u0411\u0430\u043d\u043a\u0440\u043e\u043b\u043b", icon: "\u25cb" },
    { id: "stats", label: "\u0421\u0442\u0430\u0442\u0438\u0441\u0442\u0438\u043a\u0430", icon: "\u2261" },
  ];

  // ─── EXPORT CSV ────────────────────────────────────────────────────────
  const exportCSV = useCallback(() => {
    const lines = [];
    // Sessions
    lines.push("=== СЕССИИ (покер) ===");
    lines.push("Дата,Результат ($),Часы");
    // Monthly pre-data
    monthlyPre.forEach(m => lines.push(`${m.d},${m.r},`));
    // Daily sessions
    dailySessions.forEach(s => lines.push(`${s.d},${s.r},${s.h}`));

    lines.push("");
    lines.push("=== БЕТТИНГ (€) ===");
    lines.push("Месяц,Результат (€)");
    [...betting, ...newBettingEntries].sort((a,b) => a.d.localeCompare(b.d)).forEach(b => lines.push(`${b.d},${b.v}`));

    lines.push("");
    lines.push("=== КЭШАУТЫ ===");
    lines.push("Дата,Сумма ($)");
    allCashouts.forEach(c => lines.push(`${c.d},${c.v}`));

    lines.push("");
    lines.push("=== БАНКРОЛЛ ПОКЕР ===");
    Object.entries(bankroll).forEach(([name, val]) => lines.push(`${name},${val}`));

    lines.push("");
    lines.push(`Банкролл беттинг (€),${bettingBR}`);
    lines.push(`Курс EUR/USD,${eurUsd}`);

    const csv = lines.join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `poker-data-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }, [monthlyPre, dailySessions, betting, newBettingEntries, allCashouts, bankroll, bettingBR, eurUsd]);

  if (!loaded) return (
    <div style={{ background: C.bg, color: C.textDim, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "'Outfit', sans-serif", fontSize: 14 }}>Загрузка данных...</div>
  );

  return (
    <div style={{ background: C.bg, color: C.text, minHeight: "100vh", fontFamily: "'Outfit', 'Segoe UI', sans-serif" }}>
      {/* Remove duplicate font link - already in head */}

      {/* Header */}
      <div style={{ padding: "20px 24px 0", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 36, height: 36, borderRadius: 10, background: `linear-gradient(135deg, ${C.green}, ${C.blue})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>
            ♠
          </div>
          <div>
            <div style={{ fontSize: 20, fontWeight: 600, letterSpacing: "-0.02em" }}>Cash Flow</div>
            <div style={{ fontSize: 12, color: C.textMuted, fontFamily: "'JetBrains Mono', monospace" }}>
              {new Date().toLocaleDateString("ru-RU", { day: "numeric", month: "long", year: "numeric" })}
            </div>
          </div>
        </div>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", textAlign: "right" }}>
          <div style={{ fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.1em" }}>Банкролл</div>
          <div style={{ fontSize: 20, fontWeight: 600, color: C.green }}>{fmtPlain(stats.bankrollPoker + Math.round(bettingBR * eurUsd))}</div>
          <div style={{ fontSize: 11, color: C.textDim }}>
            покер {fmtPlain(stats.bankrollPoker)} · беттинг <span style={{ color: C.gold }}>€{bettingBR.toLocaleString()}</span>
            {<span style={{ marginLeft: 6, color: saveStatus === "ok" ? C.green : saveStatus === "saving" ? C.gold : C.red }}>{saveStatus === "ok" ? "● синхр" : saveStatus === "saving" ? "● ..." : "● ошибка"}</span>}
          </div>
          <div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}>
            <button onClick={exportCSV} style={{
              padding: "4px 10px", border: `1px solid ${C.border}`, borderRadius: 6,
              background: "transparent", color: C.textMuted, fontSize: 10, cursor: "pointer", fontFamily: "inherit",
            }}>↓ CSV</button>
            <button onClick={exportJSON} style={{
              padding: "4px 10px", border: `1px solid ${C.green}`, borderRadius: 6,
              background: "transparent", color: C.green, fontSize: 10, cursor: "pointer", fontFamily: "inherit",
            }}>↓ Бэкап</button>
            <label style={{
              padding: "4px 10px", border: `1px solid ${C.gold}`, borderRadius: 6,
              background: "transparent", color: C.gold, fontSize: 10, cursor: "pointer", fontFamily: "inherit",
            }}>↑ Загрузить
              <input type="file" accept=".json" onChange={importJSON} style={{ display: "none" }} />
            </label>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs-scroll" style={{ display: "flex", gap: 4, padding: "16px 24px 0", borderBottom: `1px solid ${C.border}`,
        overflowX: "auto", WebkitOverflowScrolling: "touch", scrollbarWidth: "none", msOverflowStyle: "none" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding: "10px 18px", border: "none", borderRadius: "8px 8px 0 0", cursor: "pointer",
            fontFamily: "inherit", fontSize: 13, fontWeight: 500, transition: "all 0.2s",
            background: tab === t.id ? C.card : "transparent",
            color: tab === t.id ? C.text : C.textMuted,
            borderBottom: tab === t.id ? `2px solid ${C.green}` : "2px solid transparent",
            whiteSpace: "nowrap", flexShrink: 0,
          }}>
            <span style={{ marginRight: 6 }}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: "20px 24px" }}>
        {tab === "dash" && <DashboardTab stats={stats} bankrollPie={bankrollPie} equityCurveRaw={stats.equityCurveRaw} />}
        {tab === "input" && <InputTab bankroll={bankroll} saveBankroll={saveBankroll}
          bettingBR={bettingBR} saveBettingBR={saveBettingBR}
          eurUsd={eurUsd} saveEurUsd={saveEurUsd}
          newSessions={newSessions} saveNewSessions={saveNewSessions}
          newBettingEntries={newBettingEntries} saveNewBetting={saveNewBetting}
          newCashouts={newCashouts} saveNewCashouts={saveNewCashouts}
          betting={betting} allCashouts={allCashouts} />}
        {tab === "charts" && <ChartsTab stats={stats} chartPeriod={chartPeriod} setChartPeriod={setChartPeriod}
          customRange={customRange} setCustomRange={setCustomRange}
          filteredEquity={filteredEquity} filteredMonthly={filteredMonthly} cashouts={allCashouts} />}
        {tab === "bankroll" && <BankrollTab bankroll={bankroll} bankrollPie={bankrollPie} total={stats.bankrollPoker}
          cashouts={allCashouts} bettingBankroll={bettingBR} eurUsd={eurUsd} />}
        {tab === "stats" && <StatsTab stats={stats} sessions={dailySessions} statsPeriod={statsPeriod} setStatsPeriod={setStatsPeriod}
          customRange={customRange} setCustomRange={setCustomRange} cashouts={allCashouts} />}
      </div>
    </div>
  );
}

// ─── INPUT TAB ──────────────────────────────────────────────────────────
function InputTab({ bankroll, saveBankroll, bettingBR, saveBettingBR, eurUsd, saveEurUsd, newSessions, saveNewSessions, newBettingEntries, saveNewBetting, newCashouts, saveNewCashouts, betting, allCashouts }) {
  const today = new Date().toISOString().slice(0,10);
  const [date, setDate] = useState(today);
  const [hours, setHours] = useState("");
  const [roomValues, setRoomValues] = useState(() => ({ ...bankroll }));
  const [betMonth, setBetMonth] = useState(() => {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  });
  const [betResultEur, setBetResultEur] = useState("");
  const [betBankrollEur, setBetBankrollEur] = useState(String(bettingBR));
  const [cashoutAmount, setCashoutAmount] = useState("");
  const [cashoutDate, setCashoutDate] = useState(today);
  const [cashoutSource, setCashoutSource] = useState("888");
  const [saved, setSaved] = useState(null);
  const [mode, setMode] = useState("session");

  const rooms = ["888","IPoker","WPN","SB","CoinPoker","\u0411\u0430\u043d\u043a","USDT","Cash"];

  const oldTotal = Object.values(bankroll).reduce((s,v) => s+v, 0);
  const newTotal = Object.values(roomValues).reduce((s,v) => s + (parseFloat(v) || 0), 0);
  const sessionResult = newTotal - oldTotal;

  const handleRoomChange = (room, val) => {
    setRoomValues(prev => ({ ...prev, [room]: val }));
  };

  const submitSession = () => {
    if (!hours || isNaN(parseFloat(hours))) return;
    const newBR = {};
    rooms.forEach(r => { newBR[r] = parseFloat(roomValues[r]) || 0; });
    const session = { d: date, r: Math.round(sessionResult), h: parseFloat(hours) };
    // Merge if same date exists
    const existingIdx = newSessions.findIndex(s => s.d === date);
    let updated;
    if (existingIdx >= 0) {
      updated = newSessions.map((s, i) => i === existingIdx
        ? { d: s.d, r: s.r + session.r, h: Math.round((s.h + session.h) * 100) / 100 }
        : s);
    } else {
      updated = [...newSessions, session];
    }
    saveNewSessions(updated);
    saveBankroll(newBR);
    setHours("");
    setSaved("session");
    setTimeout(() => setSaved(null), 2000);
  };

  const submitBetting = () => {
    const result = parseFloat(betResultEur);
    if (isNaN(result)) return;
    const [y, m] = betMonth.split("-");
    const lastDay = new Date(parseInt(y), parseInt(m), 0).getDate();
    const dateStr = `${betMonth}-${String(lastDay).padStart(2,"0")}`;
    const entry = { d: dateStr, v: result };
    // Merge: if same month already exists in newBettingEntries, add to it
    const existingIdx = newBettingEntries.findIndex(e => e.d.slice(0,7) === betMonth);
    let updated;
    if (existingIdx >= 0) {
      updated = newBettingEntries.map((e, i) => i === existingIdx
        ? { d: e.d, v: e.v + result } : e);
    } else {
      updated = [...newBettingEntries, entry];
    }
    saveNewBetting(updated);
    const newBR = parseFloat(betBankrollEur);
    if (!isNaN(newBR)) saveBettingBR(newBR);
    setBetResultEur("");
    setSaved("betting");
    setTimeout(() => setSaved(null), 2000);
  };

  const deleteSession = () => {
    const updated = newSessions.slice(0, -1);
    saveNewSessions(updated);
  };

  const submitCashout = () => {
    const amount = parseFloat(cashoutAmount);
    if (!amount || amount <= 0) return;
    const entry = { d: cashoutDate, v: amount };
    saveNewCashouts([...newCashouts, entry]);
    // Deduct from selected room
    const updatedBR = { ...bankroll, [cashoutSource]: (bankroll[cashoutSource] || 0) - amount };
    saveBankroll(updatedBR);
    setRoomValues(updatedBR);
    setCashoutAmount("");
    setSaved("cashout");
    setTimeout(() => setSaved(null), 2000);
  };

  const deleteCashout = (idx) => {
    const updated = newCashouts.filter((_, i) => i !== idx);
    saveNewCashouts(updated);
  };

  const inputStyle = {
    background: "#0f1923", border: `1px solid ${C.border}`, borderRadius: 8,
    padding: "10px 12px", color: C.text, fontSize: 14, fontFamily: "'JetBrains Mono'",
    width: "100%", boxSizing: "border-box", outline: "none",
  };

  const btnStyle = (active) => ({
    padding: "8px 20px", border: `1px solid ${active ? C.green : C.border}`,
    borderRadius: 8, cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 500,
    background: active ? C.greenBg : "transparent", color: active ? C.green : C.textDim,
  });

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Mode selector */}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        <button onClick={() => setMode("session")} style={btnStyle(mode === "session")}>
          Покерная сессия
        </button>
        <button onClick={() => setMode("cashout")} style={btnStyle(mode === "cashout")}>
          Кэшаут
        </button>
        <button onClick={() => setMode("betting")} style={btnStyle(mode === "betting")}>
          Беттинг
        </button>
      </div>

      {mode === "session" && (
        <div style={{ background: C.card, borderRadius: 12, padding: 20, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 16 }}>Новая сессия</div>

          {/* Date + Hours row */}
          <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>ДАТА</div>
              <input type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle} />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>ЧАСЫ</div>
              <input type="number" step="0.1" placeholder="5.0" value={hours}
                onChange={e => setHours(e.target.value)} style={inputStyle} />
            </div>
          </div>

          {/* Room balances */}
          <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 8 }}>ТЕКУЩИЕ БАЛАНСЫ РУМОВ (обнови после сессии)</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 8, marginBottom: 16 }}>
            {rooms.map(room => (
              <div key={room}>
                <div style={{ fontSize: 11, color: C.textDim, marginBottom: 2 }}>{room}</div>
                <input type="number" value={roomValues[room] ?? ""}
                  onChange={e => handleRoomChange(room, e.target.value)}
                  style={{ ...inputStyle, fontSize: 13, padding: "8px 10px" }} />
              </div>
            ))}
          </div>

          {/* Result preview */}
          <div style={{ background: "#0f1923", borderRadius: 8, padding: 14, marginBottom: 16,
            display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 11, color: C.textMuted }}>Было: {fmtPlain(oldTotal)}</div>
              <div style={{ fontSize: 11, color: C.textMuted }}>Стало: {fmtPlain(newTotal)}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 11, color: C.textMuted }}>РЕЗУЛЬТАТ СЕССИИ</div>
              <div style={{ fontSize: 24, fontWeight: 600, fontFamily: "'JetBrains Mono'",
                color: sessionResult >= 0 ? C.green : C.red }}>
                {fmt(sessionResult)}
              </div>
            </div>
          </div>

          <button onClick={submitSession} style={{
            width: "100%", padding: "12px", border: "none", borderRadius: 8, cursor: "pointer",
            background: `linear-gradient(135deg, ${C.green}, ${C.blue})`, color: "#fff",
            fontSize: 14, fontWeight: 600, fontFamily: "inherit",
            opacity: hours ? 1 : 0.4, pointerEvents: hours ? "auto" : "none",
          }}>
            {saved === "session" ? "\u2713 Сохранено!" : "Сохранить сессию"}
          </button>
        </div>
      )}

      {mode === "cashout" && (
        <div style={{ background: C.card, borderRadius: 12, padding: 20, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 16 }}>Записать кэшаут</div>

          <div style={{ display: "flex", gap: 12, marginBottom: 12 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>ДАТА</div>
              <input type="date" value={cashoutDate} onChange={e => setCashoutDate(e.target.value)} style={inputStyle} />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>СУММА ($)</div>
              <input type="number" placeholder="6000" value={cashoutAmount}
                onChange={e => setCashoutAmount(e.target.value)} style={inputStyle} />
            </div>
          </div>

          {/* Source selector */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 6 }}>ОТКУДА</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {rooms.map(room => {
                const bal = bankroll[room] || 0;
                const active = cashoutSource === room;
                return (
                  <button key={room} onClick={() => setCashoutSource(room)} style={{
                    padding: "6px 12px", border: `1px solid ${active ? C.green : C.border}`,
                    borderRadius: 6, cursor: "pointer", fontFamily: "'JetBrains Mono'", fontSize: 11,
                    background: active ? C.greenBg : "transparent",
                    color: active ? C.green : C.textDim,
                  }}>
                    {room} <span style={{ color: C.textMuted }}>${bal.toLocaleString()}</span>
                  </button>
                );
              })}
            </div>
            {cashoutAmount && (
              <div style={{ marginTop: 8, fontSize: 12, fontFamily: "'JetBrains Mono'", color: C.textDim }}>
                {cashoutSource}: {fmtPlain(bankroll[cashoutSource] || 0)} → {fmtPlain((bankroll[cashoutSource] || 0) - (parseFloat(cashoutAmount) || 0))}
              </div>
            )}
          </div>

          <button onClick={submitCashout} style={{
            width: "100%", padding: "12px", border: "none", borderRadius: 8, cursor: "pointer",
            background: `linear-gradient(135deg, ${C.purple}, ${C.pink})`, color: "#fff",
            fontSize: 14, fontWeight: 600, fontFamily: "inherit",
            opacity: cashoutAmount ? 1 : 0.4, pointerEvents: cashoutAmount ? "auto" : "none",
          }}>
            {saved === "cashout" ? "\u2713 Сохранено!" : "Записать кэшаут"}
          </button>

          {/* Cashout history — aggregated by month */}
          <div style={{ marginTop: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div style={{ fontSize: 12, color: C.textMuted }}>ИСТОРИЯ КЭШАУТОВ</div>
              <div style={{ fontSize: 12, fontFamily: "'JetBrains Mono'", color: C.purple }}>
                Всего: {fmtPlain(allCashouts.reduce((s,c) => s+c.v, 0))}
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4, maxHeight: 300, overflowY: "auto" }}>
              {(() => {
                const byMonth = {};
                allCashouts.forEach(c => {
                  const ym = c.d.slice(0,7);
                  byMonth[ym] = (byMonth[ym] || 0) + c.v;
                });
                return Object.entries(byMonth)
                  .sort(([a],[b]) => b.localeCompare(a))
                  .map(([ym, total]) => (
                    <div key={ym} style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                      padding: "6px 10px", background: "#0f1923", borderRadius: 6, fontSize: 12, fontFamily: "'JetBrains Mono'" }}>
                      <span style={{ color: C.textDim }}>
                        {monthNames[parseInt(ym.slice(5,7))-1]} {ym.slice(0,4)}
                      </span>
                      <span style={{ color: C.purple, fontWeight: 500 }}>{fmtPlain(total)}</span>
                    </div>
                  ));
              })()}
            </div>
            {/* New cashouts — deletable */}
            {newCashouts.length > 0 && (
              <div style={{ marginTop: 10 }}>
                <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>НОВЫЕ (можно удалить)</div>
                {[...newCashouts].map((c, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                    padding: "5px 10px", background: "rgba(168,85,247,0.06)", borderRadius: 6, fontSize: 12,
                    fontFamily: "'JetBrains Mono'", marginBottom: 3 }}>
                    <span style={{ color: C.textDim }}>{c.d}</span>
                    <span style={{ color: C.purple }}>{fmtPlain(c.v)}</span>
                    <button onClick={() => deleteCashout(i)} style={{
                      background: "transparent", border: `1px solid ${C.border}`, borderRadius: 4,
                      color: C.red, cursor: "pointer", padding: "2px 8px", fontSize: 11,
                    }}>✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {mode === "betting" && (
        <div style={{ background: C.card, borderRadius: 12, padding: 20, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 16 }}>Результат беттинга за месяц (€)</div>

          <div style={{ display: "flex", gap: 12, marginBottom: 12 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>МЕСЯЦ</div>
              <input type="month" value={betMonth}
                onChange={e => setBetMonth(e.target.value)} style={inputStyle} />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>РЕЗУЛЬТАТ (€)</div>
              <input type="number" placeholder="0" value={betResultEur}
                onChange={e => setBetResultEur(e.target.value)} style={inputStyle} />
            </div>
          </div>

          <div style={{ display: "flex", gap: 12, marginBottom: 12 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>БАНКРОЛЛ (€)</div>
              <input type="number" value={betBankrollEur}
                onChange={e => setBetBankrollEur(e.target.value)} style={inputStyle} />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>КУРС EUR/USD</div>
              <input type="number" step="0.001" value={eurUsd}
                onChange={e => saveEurUsd(parseFloat(e.target.value) || 1)} style={inputStyle} />
            </div>
          </div>

          {betResultEur && (
            <div style={{ background: "#0f1923", borderRadius: 8, padding: 14, marginBottom: 16,
              display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontSize: 12, color: C.textDim }}>
                {monthNames[parseInt(betMonth.slice(5,7))-1]} {betMonth.slice(0,4)}
              </div>
              <div style={{ fontSize: 22, fontWeight: 600, fontFamily: "'JetBrains Mono'",
                color: parseFloat(betResultEur) >= 0 ? C.green : C.red }}>
                €{parseFloat(betResultEur).toLocaleString()}
              </div>
            </div>
          )}

          <button onClick={submitBetting} style={{
            width: "100%", padding: "12px", border: "none", borderRadius: 8, cursor: "pointer",
            background: `linear-gradient(135deg, ${C.gold}, #f97316)`, color: "#fff",
            fontSize: 14, fontWeight: 600, fontFamily: "inherit",
            opacity: betResultEur ? 1 : 0.4, pointerEvents: betResultEur ? "auto" : "none",
          }}>
            {saved === "betting" ? "\u2713 Сохранено!" : "Записать результат"}
          </button>

          {(betting.length > 0 || newBettingEntries.length > 0) && (
            <div style={{ marginTop: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <div style={{ fontSize: 12, color: C.textMuted }}>ИСТОРИЯ БЕТТИНГА</div>
                <div style={{ fontSize: 12, fontFamily: "'JetBrains Mono'", color: C.gold }}>
                  Всего: €{[...betting, ...newBettingEntries].reduce((s,e) => s+e.v, 0).toLocaleString()}
                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {[...betting, ...newBettingEntries]
                  .sort((a,b) => b.d.localeCompare(a.d))
                  .map((e, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 10px",
                      background: "#0f1923", borderRadius: 6, fontSize: 12, fontFamily: "'JetBrains Mono'" }}>
                      <span style={{ color: C.textDim }}>
                        {monthNames[parseInt(e.d.slice(5,7))-1]} {e.d.slice(0,4)}
                      </span>
                      <span style={{ color: e.v >= 0 ? C.green : C.red, fontWeight: 500 }}>
                        €{e.v.toLocaleString()}
                      </span>
                    </div>
                  ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Recently added sessions */}
      {newSessions.length > 0 && (
        <div style={{ background: C.card, borderRadius: 12, padding: 16, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 12 }}>
            Добавленные сессии ({newSessions.length})
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {[...newSessions].reverse().map((s, i) => {
              const realIdx = newSessions.length - 1 - i;
              const isLast = i === 0;
              return (
                <div key={realIdx} style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "8px 10px", background: "#0f1923", borderRadius: 6 }}>
                  <div style={{ fontSize: 12, fontFamily: "'JetBrains Mono'", color: C.textDim }}>{s.d}</div>
                  <div style={{ fontSize: 12, color: C.textDim }}>{s.h}ч</div>
                  <div style={{ fontSize: 13, fontFamily: "'JetBrains Mono'", fontWeight: 500,
                    color: s.r >= 0 ? C.green : C.red }}>{fmt(s.r)}</div>
                  {isLast ? (
                    <button onClick={() => deleteSession()} style={{
                      background: "transparent", border: `1px solid ${C.border}`, borderRadius: 4,
                      color: C.red, cursor: "pointer", padding: "2px 8px", fontSize: 11,
                    }}>✕</button>
                  ) : <div style={{ width: 30 }} />}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── METRIC CARD ────────────────────────────────────────────────────────────
function MetricCard({ label, value, sub, color, small }) {
  return (
    <div style={{
      background: C.card, borderRadius: 12, padding: small ? "12px 14px" : "16px 18px",
      border: `1px solid ${C.border}`, flex: 1, minWidth: small ? 100 : 140,
    }}>
      <div style={{ fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>{label}</div>
      <div style={{
        fontSize: small ? 18 : 22, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace",
        color: color || C.text, letterSpacing: "-0.02em",
      }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: C.textDim, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

// ─── DASHBOARD TAB ──────────────────────────────────────────────────────────
function DashboardTab({ stats, bankrollPie, equityCurveRaw }) {
  const recentEquity = equityCurveRaw.slice(-90);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Top metrics */}
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <MetricCard label="Покер (с 2013)" value={fmtPlain(stats.totalPoker)} color={C.green}
          sub={`${stats.totalHours.toFixed(0)} ч · $${stats.dphAll.toFixed(1)}/ч`} />
        <MetricCard label="Беттинг всего" value={`€${stats.totalBettingEur.toLocaleString()}`} color={C.gold} />
        <MetricCard label="Покер за год" value={fmt(stats.yearPoker)} color={stats.yearPoker >= 0 ? C.green : C.red}
          sub={`бет €${stats.yearBettingEur.toLocaleString()}`} />
        <MetricCard label="Покер за месяц" value={fmt(stats.monthPoker)} color={stats.monthPoker >= 0 ? C.green : C.red}
          sub={`бет €${stats.monthBettingEur.toLocaleString()}`} />
      </div>

      {/* Mini equity curve */}
      <div style={{ background: C.card, borderRadius: 12, padding: "16px 12px 8px", border: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, paddingLeft: 6, paddingRight: 6 }}>
          <div style={{ fontSize: 12, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.08em" }}>
            Equity Покер (90 дней)
          </div>
          {recentEquity.length > 1 && (() => {
            const diff = recentEquity[recentEquity.length-1].v - recentEquity[0].v;
            return <div style={{ fontSize: 12, fontFamily: "'JetBrains Mono'", color: diff >= 0 ? C.green : C.red }}>{fmt(diff)}</div>;
          })()}
        </div>
        {(() => {
          const vals = recentEquity.map(p => p.v);
          const minV = Math.min(...vals);
          const maxV = Math.max(...vals);
          const pad = Math.max((maxV - minV) * 0.15, 500);
          return (
            <ResponsiveContainer width="100%" height={180}>
              <AreaChart data={recentEquity} margin={{ left: 0, right: 0, top: 5, bottom: 0 }}>
                <defs>
                  <linearGradient id="eqGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={C.green} stopOpacity={0.3} />
                    <stop offset="100%" stopColor={C.green} stopOpacity={0} />
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                <XAxis dataKey="d" tick={{ fontSize: 10, fill: C.textMuted }} tickFormatter={d => d.slice(5)} interval="preserveStartEnd" />
                <YAxis tick={{ fontSize: 10, fill: C.textMuted }} tickFormatter={fmtK} width={55}
                  domain={[Math.floor((minV-pad)/100)*100, Math.ceil((maxV+pad)/100)*100]} />
                <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, fontFamily: "'JetBrains Mono'", color: C.text, }} labelStyle={{ color: C.textDim }} itemStyle={{ color: C.text }} cursor={{ fill: "rgba(255,255,255,0.05)" }}
                  formatter={(v) => [fmtPlain(v), "Банкролл"]} labelFormatter={l => l} />
                <Area type="monotone" dataKey="v" stroke={C.green} fill="url(#eqGrad)" strokeWidth={2} dot={false} />
              </AreaChart>
            </ResponsiveContainer>
          );
        })()}
      </div>

      {/* Bottom row: bankroll pie + recent sessions */}
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
        {/* Bankroll mini pie */}
        <div style={{ background: C.card, borderRadius: 12, padding: 16, border: `1px solid ${C.border}`, flex: "1 1 200px", minWidth: 200 }}>
          <div style={{ fontSize: 12, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>
            Распределение по румам
          </div>
          <ResponsiveContainer width="100%" height={160}>
            <PieChart>
              <Pie data={bankrollPie} dataKey="value" cx="50%" cy="50%" innerRadius={40} outerRadius={65} paddingAngle={2}>
                {bankrollPie.map((_, i) => <Cell key={i} fill={PIE_COLORS[i % PIE_COLORS.length]} />)}
              </Pie>
              <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, color: C.text, }} labelStyle={{ color: C.textDim }} itemStyle={{ color: C.text }} cursor={{ fill: "rgba(255,255,255,0.05)" }}
                formatter={(v) => fmtPlain(v)} />
            </PieChart>
          </ResponsiveContainer>
          <div style={{ display: "flex", flexWrap: "wrap", gap: "4px 12px", justifyContent: "center" }}>
            {bankrollPie.map((item, i) => (
              <div key={item.name} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: C.textDim }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: PIE_COLORS[i % PIE_COLORS.length] }} />
                {item.name}
              </div>
            ))}
          </div>
        </div>

        {/* Quick stats */}
        <div style={{ background: C.card, borderRadius: 12, padding: 16, border: `1px solid ${C.border}`, flex: "1 1 200px", minWidth: 200 }}>
          <div style={{ fontSize: 12, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 }}>
            Рекорды
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <StatRow label="Лучший день" value={fmt(stats.bestDay.r)} color={C.green} sub={stats.bestDay.d} />
            <StatRow label="Худший день" value={fmt(stats.worstDay.r)} color={C.red} sub={stats.worstDay.d} />
            <StatRow label="Лучший месяц" value={fmt(stats.bestMonth?.result)} color={C.green} sub={stats.bestMonth?.label} />
            <StatRow label="Худший месяц" value={fmt(stats.worstMonth?.result)} color={C.red} sub={stats.worstMonth?.label} />
            <StatRow label="Лучший год" value={fmt(stats.bestYear?.result)} color={C.green} sub={stats.bestYear?.year} />
            <StatRow label="Макс. просадка" value={fmt(stats.maxDrawdown)} color={C.red} />
            <StatRow label="Кэшауты" value={fmtPlain(stats.totalCashouts)} color={C.purple} sub="всего" />
          </div>
        </div>
      </div>
    </div>
  );
}

function StatRow({ label, value, color, sub }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div>
        <div style={{ fontSize: 12, color: C.textDim }}>{label}</div>
        {sub && <div style={{ fontSize: 10, color: C.textMuted }}>{sub}</div>}
      </div>
      <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'JetBrains Mono'", color }}>{value}</div>
    </div>
  );
}

// ─── CHARTS TAB ─────────────────────────────────────────────────────────────
function ChartsTab({ stats, chartPeriod, setChartPeriod, customRange, setCustomRange, filteredEquity, filteredMonthly, cashouts }) {
  const periods = [
    { id: "all", label: "Всё" }, { id: "3y", label: "3 года" }, { id: "1y", label: "1 год" },
    { id: "6m", label: "6 мес" }, { id: "3m", label: "3 мес" }, { id: "custom", label: "⚙" },
  ];

  const dateInputStyle = { background: "#0f1923", border: `1px solid ${C.border}`, borderRadius: 6,
    padding: "4px 8px", color: C.text, fontSize: 11, fontFamily: "'JetBrains Mono'" };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Period selector */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        {periods.map(p => (
          <button key={p.id} onClick={() => setChartPeriod(p.id)} style={{
            padding: "6px 14px", border: `1px solid ${chartPeriod === p.id ? C.green : C.border}`,
            borderRadius: 8, cursor: "pointer", fontFamily: "inherit", fontSize: 12,
            background: chartPeriod === p.id ? C.greenBg : "transparent",
            color: chartPeriod === p.id ? C.green : C.textDim,
          }}>
            {p.label}
          </button>
        ))}
      </div>
      {chartPeriod === "custom" && (
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <span style={{ fontSize: 11, color: C.textMuted }}>с</span>
          <input type="date" value={customRange.from} onChange={e => setCustomRange(r => ({...r, from: e.target.value}))} style={dateInputStyle} />
          <span style={{ fontSize: 11, color: C.textMuted }}>по</span>
          <input type="date" value={customRange.to} onChange={e => setCustomRange(r => ({...r, to: e.target.value}))} style={dateInputStyle} />
        </div>
      )}

      {/* Equity curve */}
      <div style={{ background: C.card, borderRadius: 12, padding: "16px 12px 8px", border: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, paddingLeft: 6, paddingRight: 6 }}>
          <div style={{ fontSize: 13, fontWeight: 500 }}>Equity Покер ($)</div>
          {chartPeriod !== "all" && filteredEquity.length > 0 && (() => {
            const start = filteredEquity[0].v;
            const end = filteredEquity[filteredEquity.length - 1].v;
            const diff = end - start;
            return (
              <div style={{ fontSize: 12, fontFamily: "'JetBrains Mono'", color: diff >= 0 ? C.green : C.red }}>
                {fmt(diff)} за период
              </div>
            );
          })()}
        </div>
        {(() => {
          // For short periods: zoom Y-axis to data range
          const isShort = chartPeriod !== "all";
          const vals = filteredEquity.map(p => p.v);
          const minV = Math.min(...vals);
          const maxV = Math.max(...vals);
          const padding = Math.max((maxV - minV) * 0.15, 500);
          const yDomain = isShort ? [Math.floor((minV - padding)/100)*100, Math.ceil((maxV + padding)/100)*100] : [0, "auto"];

          return (
            <ResponsiveContainer width="100%" height={280}>
              <AreaChart data={filteredEquity} margin={{ left: 0, right: 0, top: 5, bottom: 0 }}>
                <defs>
                  <linearGradient id="eqGrad2" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={C.green} stopOpacity={0.25} />
                    <stop offset="100%" stopColor={C.green} stopOpacity={0} />

                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                <XAxis dataKey="d" tick={{ fontSize: 10, fill: C.textMuted }} tickFormatter={d => d.slice(2,7)} interval="preserveStartEnd" />

                <Area type="monotone" dataKey="v" stroke={C.green} fill="url(#eqGrad2)" strokeWidth={2} dot={false} />
              </AreaChart>
            </ResponsiveContainer>

        })()}

      {/* Monthly results */}
      <div style={{ background: C.card, borderRadius: 12, padding: "16px 12px 8px", border: `1px solid ${C.border}` }}>

          <BarChart data={filteredMonthly} margin={{ left: 0, right: 0, top: 5, bottom: 0 }}>

            <XAxis dataKey="label" tick={{ fontSize: 10, fill: C.textMuted }} interval={0} angle={-45} textAnchor="end" height={50} />

      <div style={{ background: C.card, borderRadius: 12, padding: "16px 12px 8px", border: `1px solid ${C.border}` }}>

              formatter={(v) => [`$${v.toFixed(1)}/ч`, "$/час"]} />
            <ReferenceLine y={0} stroke={C.textMuted} strokeDasharray="3 3" />
            <Bar dataKey="dph" radius={[4,4,0,0]}>
              {filteredMonthly.map((entry, i) => (
                <Cell key={i} fill={entry.dph >= 0 ? C.gold : C.red} fillOpacity={0.7} />

          </BarChart>
        </ResponsiveContainer>

      {/* Hours by month */}
      <div style={{ background: C.card, borderRadius: 12, padding: "16px 12px 8px", border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8, paddingLeft: 6 }}>Часы по месяцам (с апр 2020)</div>
        <ResponsiveContainer width="100%" height={180}>
          <BarChart data={filteredMonthly.filter(m => m.hours > 0)} margin={{ left: 0, right: 0, top: 5, bottom: 0 }}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="label" tick={{ fontSize: 10, fill: C.textMuted }} interval={0} angle={-45} textAnchor="end" height={50} />
            <YAxis tick={{ fontSize: 10, fill: C.textMuted }} width={35} />
            <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, color: C.text, }} labelStyle={{ color: C.textDim }} itemStyle={{ color: C.text }} cursor={{ fill: "rgba(255,255,255,0.05)" }}
              formatter={(v) => [`${v.toFixed(1)} ч`, "Часы"]} />
            <Bar dataKey="hours" fill={C.blue} fillOpacity={0.6} radius={[4,4,0,0]} />
          </BarChart>
        </ResponsiveContainer>
      </div>

      {/* Betting results (€) */}
      {stats.bettingEquity.length > 0 && (
        <div style={{ background: C.card, borderRadius: 12, padding: "16px 12px 8px", border: `1px solid ${C.border}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, paddingLeft: 6, paddingRight: 6 }}>
            <div style={{ fontSize: 13, fontWeight: 500 }}>Беттинг (€)</div>
            <div style={{ fontSize: 12, fontFamily: "'JetBrains Mono'", color: C.gold }}>
              Всего: €{stats.totalBettingEur.toLocaleString()} · Банкролл: €{stats.bankrollBettingEur.toLocaleString()}
            </div>
          </div>
          <ResponsiveContainer width="100%" height={160}>
            <AreaChart data={stats.bettingEquity} margin={{ left: 0, right: 0, top: 5, bottom: 0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis dataKey="d" tick={{ fontSize: 10, fill: C.textMuted }} tickFormatter={d => {
                const m = parseInt(d.slice(5,7))-1;
                return monthNames[m] + " " + d.slice(2,4);
              }} />
              <YAxis tick={{ fontSize: 10, fill: C.textMuted }} tickFormatter={v => `€${v}`} width={50} />
              <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, fontFamily: "'JetBrains Mono'", color: C.text }} labelStyle={{ color: C.textDim }}
                labelFormatter={d => { const m = parseInt(d.slice(5,7))-1; return monthNames[m] + " " + d.slice(0,4); }}
                formatter={(v) => [`€${v.toLocaleString()}`, "Итого"]} />
              <Area type="monotone" dataKey="v" stroke={C.gold} fill="rgba(234,179,8,0.15)" strokeWidth={2} dot={{ fill: C.gold, r: 3 }} />
            </AreaChart>
          </ResponsiveContainer>
        </div>
      )}

      {/* Cashouts */}
      <div style={{ background: C.card, borderRadius: 12, padding: "16px 12px 8px", border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8, paddingLeft: 6 }}>
          Кэшауты · Всего: {fmtPlain(cashouts.reduce((s,c) => s+c.v, 0))}
        </div>
        <ResponsiveContainer width="100%" height={180}>
          <BarChart data={(() => {
            const byM = {};
            cashouts.forEach(c => {
              const ym = c.d.slice(0,7);
              byM[ym] = (byM[ym] || 0) + c.v;
            });
            return Object.entries(byM).sort(([a],[b]) => a.localeCompare(b)).map(([ym, v]) => ({
              label: monthNames[parseInt(ym.slice(5,7))-1] + " " + ym.slice(2,4), v
            }));
          })()} margin={{ left: 0, right: 0, top: 5, bottom: 0 }}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="label" tick={{ fontSize: 9, fill: C.textMuted }} interval={0} angle={-45} textAnchor="end" height={50} />
            <YAxis tick={{ fontSize: 10, fill: C.textMuted }} tickFormatter={fmtK} width={45} />
            <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, color: C.text, }} labelStyle={{ color: C.textDim }} itemStyle={{ color: C.text }} cursor={{ fill: "rgba(255,255,255,0.05)" }}
              formatter={(v) => [fmtPlain(v), "Кэшаут"]} />
            <Bar dataKey="v" fill={C.purple} fillOpacity={0.7} radius={[4,4,0,0]} />
          </BarChart>
        </ResponsiveContainer>
      </div>

}

// ─── STATS TAB ──────────────────────────────────────────────────────────────
function StatsTab({ stats, sessions, statsPeriod, setStatsPeriod, customRange, setCustomRange, cashouts }) {
  const periods = [
    { id: "all", label: "Всё" }, { id: "3y", label: "3 года" }, { id: "1y", label: "1 год" },
    { id: "6m", label: "6 мес" }, { id: "3m", label: "3 мес" }, { id: "custom", label: "⚙" },
  ];

  const dateInputStyle = { background: "#0f1923", border: `1px solid ${C.border}`, borderRadius: 6,
    padding: "4px 8px", color: C.text, fontSize: 11, fontFamily: "'JetBrains Mono'" };

  // Filter sessions by period
  const filtered = useMemo(() => {
    if (statsPeriod === "all") return sessions;
    let fromStr, toStr;
    if (statsPeriod === "custom") {
      fromStr = customRange.from || "2000-01-01";
      toStr = customRange.to || TODAY;
    } else {
      const now = new Date();
      let cutoff;
      if (statsPeriod === "3y") cutoff = new Date(now.getFullYear()-3, now.getMonth(), now.getDate());
      else if (statsPeriod === "1y") cutoff = new Date(now.getFullYear()-1, now.getMonth(), now.getDate());
      else if (statsPeriod === "6m") cutoff = new Date(now.getFullYear(), now.getMonth()-6, now.getDate());
      else cutoff = new Date(now.getFullYear(), now.getMonth()-3, now.getDate());
      fromStr = cutoff.toISOString().slice(0,10);
      toStr = TODAY;
    }
    return sessions.filter(s => s.d >= fromStr && s.d <= toStr);
  }, [sessions, statsPeriod, customRange]);

  // Filtered stats
  const fStats = useMemo(() => {
    const totalResult = filtered.reduce((s,x) => s+x.r, 0);
    const totalHours = filtered.reduce((s,x) => s+x.h, 0);
    const winDays = filtered.filter(s => s.r > 0).length;
    const lossDays = filtered.filter(s => s.r < 0).length;
    const winPct = filtered.length > 0 ? (winDays / filtered.length * 100) : 0;
    // Calculate months in period
    let periodMonths;
    if (statsPeriod === "all" || statsPeriod === "custom") {
      periodMonths = new Set(filtered.map(s => s.d.slice(0,7))).size || 1;
    } else {
      const map = { "3y": 36, "1y": 12, "6m": 6, "3m": 3 };
      periodMonths = map[statsPeriod] || 1;
    }
    const avgHoursPerMonth = totalHours / periodMonths;
    return { totalResult, totalHours, winDays, lossDays, winPct, months: periodMonths, avgHoursPerMonth };
  }, [filtered, statsPeriod]);

  // Day of week analysis
  const byDow = useMemo(() => {
    const days = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
    const acc = Array(7).fill(null).map(() => ({ result: 0, hours: 0, count: 0 }));
    filtered.forEach(s => {
      const dow = new Date(s.d).getDay();
      acc[dow].result += s.r;
      acc[dow].hours += s.h;
      acc[dow].count++;
    });
    return acc.map((d, i) => ({
      day: days[i],
      avgResult: d.count > 0 ? d.result / d.count : 0,
      totalResult: d.result,
      count: d.count,
      dph: d.hours > 0 ? d.result / d.hours : 0,
    }));
  }, [filtered]);

  // Streaks
  const streaks = useMemo(() => {
    let maxWin = 0, maxLoss = 0, curWin = 0, curLoss = 0;
    filtered.forEach(s => {
      if (s.r > 0) { curWin++; curLoss = 0; maxWin = Math.max(maxWin, curWin); }
      else if (s.r < 0) { curLoss++; curWin = 0; maxLoss = Math.max(maxLoss, curLoss); }
      else { curWin = 0; curLoss = 0; }
    });
    return { maxWin, maxLoss };
  }, [filtered]);

  // Year summary (always show all years)
  const yearData = useMemo(() => {
    return Object.entries(stats.byYear).sort(([a],[b]) => a.localeCompare(b)).map(([year, d]) => ({
      year,
      ...d,
      dph: d.hours > 0 ? d.poker / d.hours : null,
      avgSession: d.sessions > 0 ? d.poker / d.sessions : null,
    }));
  }, [stats.byYear]);

  // Results by calendar month (all Januaries, all Februaries, etc.)
  const byCalMonth = useMemo(() => {
    const mNames = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
    const acc = Array(12).fill(null).map(() => ({ result: 0, hours: 0, sessions: 0, years: new Set() }));
    filtered.forEach(s => {
      const m = parseInt(s.d.slice(5,7)) - 1;
      acc[m].result += s.r;
      acc[m].hours += s.h;
      acc[m].sessions++;
      acc[m].years.add(s.d.slice(0,4));
    });
    return acc.map((d, i) => ({
      month: mNames[i],
      result: d.result,
      hours: d.hours,
      sessions: d.sessions,
      yearCount: d.years.size,
      avgPerYear: d.years.size > 0 ? d.result / d.years.size : 0,
      dph: d.hours > 0 ? d.result / d.hours : null,
    })).filter(d => d.sessions > 0);
  }, [filtered]);

  // Cashout stats - count months from April 2024
  const cashoutStats = useMemo(() => {
    const totalCashout = cashouts.reduce((s, c) => s + c.v, 0);
    // Months since April 2024
    const startDate = new Date(2024, 3, 1); // April 2024
    const now = new Date();
    const monthsSinceStart = (now.getFullYear() - startDate.getFullYear()) * 12 + (now.getMonth() - startDate.getMonth()) + 1;
    const avgPerMonth = monthsSinceStart > 0 ? totalCashout / monthsSinceStart : 0;
    return { total: totalCashout, avgPerMonth, count: cashouts.length, months: monthsSinceStart };
  }, [cashouts]);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Period filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        {periods.map(p => (
          <button key={p.id} onClick={() => setStatsPeriod(p.id)} style={{
            padding: "6px 14px", border: `1px solid ${statsPeriod === p.id ? C.green : C.border}`,
            borderRadius: 20, cursor: "pointer", fontSize: 12, fontFamily: "inherit",
            background: statsPeriod === p.id ? C.greenBg : "transparent",
            color: statsPeriod === p.id ? C.green : C.textDim,
          }}>{p.label}</button>
        ))}
      </div>
      {statsPeriod === "custom" && (
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <span style={{ fontSize: 11, color: C.textMuted }}>с</span>
          <input type="date" value={customRange.from} onChange={e => setCustomRange(r => ({...r, from: e.target.value}))} style={dateInputStyle} />
          <span style={{ fontSize: 11, color: C.textMuted }}>по</span>
          <input type="date" value={customRange.to} onChange={e => setCustomRange(r => ({...r, to: e.target.value}))} style={dateInputStyle} />
        </div>
      )}

      {/* Quick numbers */}
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <MetricCard small label="Сессий" value={filtered.length} />
        <MetricCard small label="Выигрышных" value={`${fStats.winDays} (${fStats.winPct.toFixed(0)}%)`} color={C.green} />
        <MetricCard small label="Проигрышных" value={fStats.lossDays} color={C.red} />
        <MetricCard small label="Серия W" value={`${streaks.maxWin} дн`} color={C.green} />
        <MetricCard small label="Серия L" value={`${streaks.maxLoss} дн`} color={C.red} />
        <MetricCard small label="Кэшаут" value={fmtPlain(cashoutStats.total)} color={C.purple}
          sub={`~${fmtPlain(Math.round(cashoutStats.avgPerMonth))}/мес (${cashoutStats.months} мес)`} />
      </div>

      {/* Hours block */}
      <div style={{ background: C.card, borderRadius: 12, padding: 16, border: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.1em" }}>Часы</div>
            <div style={{ fontSize: 28, fontWeight: 600, fontFamily: "'JetBrains Mono'", color: C.blue }}>
              {fStats.totalHours.toFixed(0)}
            </div>
            <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>
              Среднее за месяц: {fStats.avgHoursPerMonth.toFixed(1)} ч
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 11, color: C.textMuted }}>$/ЧАС</div>
            <div style={{ fontSize: 22, fontWeight: 600, fontFamily: "'JetBrains Mono'",
              color: fStats.totalHours > 0 ? C.gold : C.textMuted }}>
              {fStats.totalHours > 0 ? `$${(fStats.totalResult / fStats.totalHours).toFixed(1)}` : "—"}
            </div>
          </div>
        </div>
      </div>

      {/* By year */}
      <div style={{ background: C.card, borderRadius: 12, padding: 16, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 12 }}>По годам</div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, fontFamily: "'JetBrains Mono'" }}>
            <thead>
              <tr style={{ color: C.textMuted, textAlign: "left" }}>
                <th style={{ padding: "6px 8px", borderBottom: `1px solid ${C.border}` }}>Год</th>
                <th style={{ padding: "6px 8px", borderBottom: `1px solid ${C.border}`, textAlign: "right" }}>Покер ($)</th>
                <th style={{ padding: "6px 8px", borderBottom: `1px solid ${C.border}`, textAlign: "right" }}>Бет (€)</th>
                <th style={{ padding: "6px 8px", borderBottom: `1px solid ${C.border}`, textAlign: "right" }}>Часы</th>
                <th style={{ padding: "6px 8px", borderBottom: `1px solid ${C.border}`, textAlign: "right" }}>$/ч</th>
              </tr>
            </thead>
            <tbody>
              {yearData.map(y => (
                <tr key={y.year}>
                  <td style={{ padding: "8px", borderBottom: `1px solid ${C.border}` }}>{y.year}</td>
                  <td style={{ padding: "8px", borderBottom: `1px solid ${C.border}`, textAlign: "right",
                    color: y.poker >= 0 ? C.green : C.red, fontWeight: 500 }}>{fmt(y.poker)}</td>
                  <td style={{ padding: "8px", borderBottom: `1px solid ${C.border}`, textAlign: "right",
                    color: y.bettingEur ? (y.bettingEur >= 0 ? C.gold : C.red) : C.textMuted }}>
                    {y.bettingEur ? `€${y.bettingEur.toLocaleString()}` : "—"}</td>
                  <td style={{ padding: "8px", borderBottom: `1px solid ${C.border}`, textAlign: "right", color: C.textDim }}>
                    {y.hasHours ? y.hours.toFixed(0) : "—"}</td>
                  <td style={{ padding: "8px", borderBottom: `1px solid ${C.border}`, textAlign: "right",
                    color: y.dph !== null ? (y.dph >= 0 ? C.gold : C.red) : C.textMuted }}>
                    {y.dph !== null ? `$${y.dph.toFixed(1)}` : "—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* By day of week */}
      <div style={{ background: C.card, borderRadius: 12, padding: "16px 12px 8px", border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8, paddingLeft: 6 }}>Средний результат по дням недели</div>
        <ResponsiveContainer width="100%" height={180}>
          <BarChart data={byDow} margin={{ left: 0, right: 0, top: 5, bottom: 0 }}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="day" tick={{ fontSize: 11, fill: C.textDim }} />
            <YAxis tick={{ fontSize: 10, fill: C.textMuted }} tickFormatter={v => `$${v.toFixed(0)}`} width={50} />
            <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, color: C.text, }} labelStyle={{ color: C.textDim }} itemStyle={{ color: C.text }} cursor={{ fill: "rgba(255,255,255,0.05)" }}
              formatter={(v, name) => [fmt(v, 0), name === "avgResult" ? "Средний" : name]} />
            <ReferenceLine y={0} stroke={C.textMuted} strokeDasharray="3 3" />
            <Bar dataKey="avgResult" name="Средний результат" radius={[4,4,0,0]}>
              {byDow.map((entry, i) => (
                <Cell key={i} fill={entry.avgResult >= 0 ? C.green : C.red} fillOpacity={0.7} />
              ))}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>

      {/* Yearly bar chart */}
      <div style={{ background: C.card, borderRadius: 12, padding: "16px 12px 8px", border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8, paddingLeft: 6 }}>Покер по годам ($)</div>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={yearData} margin={{ left: 0, right: 0, top: 5, bottom: 0 }}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="year" tick={{ fontSize: 12, fill: C.textDim }} />
            <YAxis tick={{ fontSize: 10, fill: C.textMuted }} tickFormatter={fmtK} width={55} />
            <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, color: C.text, }} labelStyle={{ color: C.textDim }} itemStyle={{ color: C.text }} cursor={{ fill: "rgba(255,255,255,0.05)" }}
              formatter={(v, name, props) => {
                const d = props.payload;
                const parts = [`Покер: ${fmt(d.poker)}`];
                if (d.bettingEur) parts.push(`Бет: €${d.bettingEur.toLocaleString()}`);
                return [parts.join(" · "), ""];
              }} />
            <Bar dataKey="poker" radius={[6,6,0,0]}>
              {yearData.map((entry, i) => (
                <Cell key={i} fill={entry.poker >= 0 ? C.green : C.red} fillOpacity={0.8} />
              ))}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>

      {/* By calendar month */}
      <div style={{ background: C.card, borderRadius: 12, padding: 16, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 12 }}>По месяцам (все годы)</div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, fontFamily: "'JetBrains Mono'" }}>
            <thead>
              <tr style={{ color: C.textMuted, textAlign: "left" }}>
                <th style={{ padding: "6px 8px", borderBottom: `1px solid ${C.border}` }}>Месяц</th>
                <th style={{ padding: "6px 8px", borderBottom: `1px solid ${C.border}`, textAlign: "right" }}>Итого</th>
                <th style={{ padding: "6px 8px", borderBottom: `1px solid ${C.border}`, textAlign: "right" }}>Сред/год</th>
                <th style={{ padding: "6px 8px", borderBottom: `1px solid ${C.border}`, textAlign: "right" }}>Сессий</th>
                <th style={{ padding: "6px 8px", borderBottom: `1px solid ${C.border}`, textAlign: "right" }}>Часы</th>
                <th style={{ padding: "6px 8px", borderBottom: `1px solid ${C.border}`, textAlign: "right" }}>$/ч</th>
              </tr>
            </thead>
            <tbody>
              {byCalMonth.map(m => (
                <tr key={m.month}>
                  <td style={{ padding: "8px", borderBottom: `1px solid ${C.border}` }}>{m.month}</td>
                  <td style={{ padding: "8px", borderBottom: `1px solid ${C.border}`, textAlign: "right",
                    color: m.result >= 0 ? C.green : C.red, fontWeight: 500 }}>{fmt(m.result)}</td>
                  <td style={{ padding: "8px", borderBottom: `1px solid ${C.border}`, textAlign: "right",
                    color: m.avgPerYear >= 0 ? C.green : C.red }}>{fmt(m.avgPerYear)}</td>
                  <td style={{ padding: "8px", borderBottom: `1px solid ${C.border}`, textAlign: "right", color: C.textDim }}>{m.sessions}</td>
                  <td style={{ padding: "8px", borderBottom: `1px solid ${C.border}`, textAlign: "right", color: C.textDim }}>{m.hours.toFixed(0)}</td>
                  <td style={{ padding: "8px", borderBottom: `1px solid ${C.border}`, textAlign: "right",
                    color: m.dph !== null ? (m.dph >= 0 ? C.gold : C.red) : C.textMuted }}>
                    {m.dph !== null ? `$${m.dph.toFixed(1)}` : "—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Monthly bar chart */}
      <div style={{ background: C.card, borderRadius: 12, padding: "16px 12px 8px", border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8, paddingLeft: 6 }}>Результат по месяцам (все годы)</div>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={byCalMonth} margin={{ left: 0, right: 0, top: 5, bottom: 0 }}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="month" tick={{ fontSize: 9, fill: C.textDim }} interval={0} angle={-45} textAnchor="end" height={50} />
            <YAxis tick={{ fontSize: 10, fill: C.textMuted }} tickFormatter={fmtK} width={55} />
            <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, color: C.text }} labelStyle={{ color: C.textDim }} itemStyle={{ color: C.text }} cursor={{ fill: "rgba(255,255,255,0.05)" }}
              formatter={(v) => [fmt(v), "Итого"]} />
            <ReferenceLine y={0} stroke={C.textMuted} strokeDasharray="3 3" />
            <Bar dataKey="result" name="Итого" radius={[4,4,0,0]}>
              {byCalMonth.map((entry, i) => (
                <Cell key={i} fill={entry.result >= 0 ? C.green : C.red} fillOpacity={0.7} />
              ))}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

// ─── PIN AUTH WRAPPER ───────────────────────────────────────────────────────
function App() {
  const [authed, setAuthed] = useState(false);
  const [pin, setPin] = useState("");
  const [error, setError] = useState(false);

  // Check localStorage for saved auth
  useEffect(() => {
    if (localStorage.getItem("poker-auth") === "true") setAuthed(true);
  }, []);

  const handleSubmit = () => {
    if (pin === APP_PIN) {
      setAuthed(true);
      localStorage.setItem("poker-auth", "true");
    } else {
      setError(true);
      setTimeout(() => setError(false), 1500);
    }
  };

  if (authed) return <PokerDashboard />;

  return (
    <div style={{
      background: "#0c1118", color: "#e2e8f0", minHeight: "100vh",
      display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "'Outfit', sans-serif",
    }}>
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 48, marginBottom: 20 }}>♠</div>
        <div style={{ fontSize: 20, fontWeight: 600, marginBottom: 24 }}>Cash Flow</div>
        <input
          type="password"
          inputMode="numeric"
          pattern="[0-9]*"
          placeholder="PIN"
          value={pin}
          onChange={e => setPin(e.target.value)}
          onKeyDown={e => e.key === "Enter" && handleSubmit()}
          style={{
            width: 160, padding: "12px 16px", textAlign: "center",
            background: "#131c27", border: `2px solid ${error ? "#ef4444" : "#1e2d3d"}`,
            borderRadius: 12, color: "#e2e8f0", fontSize: 24,
            fontFamily: "'JetBrains Mono'", letterSpacing: "0.3em",
            outline: "none", transition: "border-color 0.2s",
          }}
          autoFocus
        />
        <div style={{ marginTop: 16 }}>
          <button onClick={handleSubmit} style={{
            padding: "10px 40px", border: "none", borderRadius: 8,
            background: "linear-gradient(135deg, #22c55e, #16a34a)",
            color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer",
            fontFamily: "'Outfit', sans-serif",
          }}>Войти</button>
        </div>
        {error && <div style={{ color: "#ef4444", fontSize: 12, marginTop: 12 }}>Неверный PIN</div>}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
